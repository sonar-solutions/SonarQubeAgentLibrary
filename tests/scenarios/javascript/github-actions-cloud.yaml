name: javascript-github-actions-cloud-eu
description: JavaScript/React project with GitHub Actions targeting SonarQube Cloud EU instance
category: priority
language: javascript
platform: github-actions
sonarqube: cloud-eu

input:
  project_structure:
    - package.json
    - package-lock.json
    - .github/workflows/ci.yml
    - src/App.js
    - src/components/Header.js
    - public/index.html

  user_responses:
    - question: "CI/CD platform confirmation"
      answer: "Yes, GitHub Actions"
    - question: "SonarQube information"
      answer: "Cloud, my-js-app, my-team, EU"

expected:
  skills_invoked:
    - project-detection
    - prerequisites-gathering
    - platform-github-actions
    - scanner-cli
    - pipeline-creation
    - security-practices
    - devops-setup-instructions

  decisions:
    - checkpoint: "Scanner selection"
      expected: "Use sonarqube-scan-action OR sonar-scanner-cli (CLI scanner)"
      reason: "JavaScript project without build tool integration"

    - checkpoint: "Branch patterns"
      expected: "Include standard patterns: main, master, develop/*, feature/*"
      reason: "Standard branch coverage without detection"

    - checkpoint: "SonarQube URL"
      expected: "https://sonarcloud.io"
      reason: "EU Cloud instance"

  documentation_fetches:
    expected_domains:
      - "docs.sonarsource.com"
      - "github.com"
    expected_pages:
      - pattern: "docs.sonarsource.com.*scanner-cli"
        description: "CLI scanner documentation"
      - pattern: "github.com/actions.*checkout"
        description: "GitHub Actions checkout documentation"
    min_fetches: 2
    max_fetches: 10

  files_created:
    - path: ".github/workflows/sonarqube.yml"
      must_contain:
        - "actions/checkout@v4"
        - "fetch-depth: 0"
        - "${{ secrets.SONAR_TOKEN }}"
        - "sonar.projectKey=my-js-app"
        - "sonar.organization=my-team"
        - "https://sonarcloud.io"
        - "feature/"
      must_not_contain:
        - "squ_"
        - "sqp_"
        - "actions/checkout@v3"

    - path: "sonar-project.properties"
      must_contain:
        - "sonar.projectKey=my-js-app"
        - "sonar.organization=my-team"
        - "sonar.sources=src"
      must_not_contain:
        - "sonar.login="

  validation:
    - type: "yaml_syntax"
      file: ".github/workflows/sonarqube.yml"
    - type: "properties_syntax"
      file: "sonar-project.properties"
    - type: "no_hardcoded_credentials"
      files: ["**/*.yml", "**/*.yaml", "**/*.properties"]
    - type: "version_currency"
      check: "GitHub Actions versions"
    - type: "security_compliance"
      rules: ["security-practices"]
    - type: "documentation_fetches"
      rules: ["minimum-fetches", "official-sources", "relevant-pages"]

assertions:
  - "All prerequisites gathered before file creation"
  - "web/fetch used to get latest versions"
  - "Correct scanner selection (CLI scanner for JS)"
  - "Security practices applied (secrets, not hardcoded)"
  - "Standard branch patterns in triggers (main, master, develop/*, feature/*)"
  - "Secrets setup instructions provided"
  - "sonar-project.properties created without credentials"

scoring:
  accuracy: 40
  security: 20
  efficiency: 15
  currency: 15
  usability: 10
