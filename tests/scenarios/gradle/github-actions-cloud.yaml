name: gradle-github-actions-cloud-eu
description: Gradle Kotlin project with GitHub Actions targeting SonarQube Cloud EU instance
category: priority
language: gradle
platform: github-actions
sonarqube: cloud-eu

input:
  project_structure:
    - build.gradle.kts
    - settings.gradle.kts
    - .github/workflows/ci.yml
    - src/main/kotlin/com/example/Application.kt
    - src/test/kotlin/com/example/ApplicationTest.kt

  user_responses:
    - question: "CI/CD platform confirmation"
      answer: "Yes, GitHub Actions"
    - question: "SonarQube information"
      answer: "Cloud, my-org_my-gradle-project, my-org, EU"

expected:
  skills_invoked:
    - project-detection
    - platform-github-actions
    - scanner-gradle
    - pipeline-creation
    - security-practices
    - devops-setup-instructions

  decisions:
    - checkpoint: "Scanner selection"
      expected: "Use ./gradlew sonar command (NO scan action)"
      reason: "Gradle build tool integration"

    - checkpoint: "Branch patterns"
      expected: "Include standard patterns: main, master, develop/*, feature/*"
      reason: "Standard branch coverage without detection"

    - checkpoint: "SonarQube URL"
      expected: "https://sonarcloud.io"
      reason: "EU Cloud instance"

  documentation_fetches:
    expected_domains:
      - "docs.sonarsource.com"
      - "github.com"
    expected_pages:
      - pattern: "docs.sonarsource.com.*gradle"
        description: "Gradle scanner documentation"
      - pattern: "github.com/actions.*checkout"
        description: "GitHub Actions checkout documentation"
      - pattern: "github.com/actions.*setup-java"
        description: "GitHub Actions setup-java documentation"
    min_fetches: 2
    max_fetches: 10

  files_created:
    - path: ".github/workflows/sonarqube.yml"
      must_contain:
        - "actions/checkout"
        - "fetch-depth: 0"
        - "actions/setup-java"
        - "${{ secrets.SONAR_TOKEN }}"
        - "sonar"
        - "feature/"
      must_not_contain:
        - "sonarqube-scan-action"
        - "squ_"
        - "sqp_"
        - "actions/checkout@v3"
        - "actions/setup-java@v3"

  validation:
    - type: "yaml_syntax"
      file: ".github/workflows/sonarqube.yml"
    - type: "no_hardcoded_credentials"
      files: ["**/*.yml", "**/*.yaml"]
    - type: "version_currency"
      check: "GitHub Actions versions"
    - type: "security_compliance"
      rules: ["security-practices"]
    - type: "documentation_fetches"
      rules: ["minimum-fetches", "official-sources", "relevant-pages"]

assertions:
  - "All prerequisites gathered before file creation"
  - "web/fetch used to get latest versions"
  - "Correct scanner selection (Gradle command, not scan action)"
  - "Security practices applied (secrets, not hardcoded)"
  - "Standard branch patterns in triggers (main, master, develop/*, feature/*)"
  - "Secrets setup instructions provided"

scoring:
  accuracy: 40
  security: 20
  efficiency: 15
  currency: 15
  usability: 10
